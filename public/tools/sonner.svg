<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <linearGradient id="sonner-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <style>
    .bg {
      fill: #09090b;
      rx: 16px;
    }
    .text-main {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 64px;
      letter-spacing: -0.05em;
      fill: #f4f4f5;
    }
    .text-accent {
      fill: url(#sonner-gradient);
    }
    .toast-icon {
      fill: url(#sonner-gradient);
      opacity: 0.9;
    }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <g transform="translate(40, 42)">
    <rect width="24" height="6" rx="2" class="toast-icon" y="12" opacity="0.4" />
    <rect width="32" height="6" rx="2" class="toast-icon" y="6" opacity="0.7" />
    <rect width="40" height="6" rx="2" class="toast-icon" y="0" />
  </g>

  <text x="100" y="80" class="text-main">Sonner<tspan class="text-accent">.</tspan></text>
</svg>
